name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -buildvcs=false ./...

      - name: Unit tests
        run: go test -buildvcs=false ./... -v -count=1

      - name: Unit tests (race detector)
        run: go test -buildvcs=false -race ./... -count=1
