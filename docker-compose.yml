version: "3.9"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scheduler
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_DSN: "root:root@tcp(mysql:3306)/scheduler?parseTime=true&loc=UTC"
      SERVER_PORT: "8080"
      API_KEY: "dev-secret"
      HTTP_TIMEOUT_SEC: "30"
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  mysql_data:
